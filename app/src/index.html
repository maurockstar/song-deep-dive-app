<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Deep Dive</title>
  <meta name="description" content="The story, the people, and the connections behind the song you're playing.">
  <link rel="stylesheet" href="./styles.css">
  <style>
    .connects { display:flex; gap:8px; align-items:center; }
    .btn-primary.alt { background:linear-gradient(135deg,#fa2d48,#fb5c74); }
    .btn-primary.hidden { display:none; }
    .btn-primary.connected { filter:saturate(.7) brightness(1.05); }
    .lang-selector { background:#0c1620; border:1px solid rgba(29,185,84,.3); color:var(--text); padding:8px 12px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; }
    .lang-selector:hover { border-color:var(--green); }
    .apple-notice { margin:0 0 14px; padding:12px 14px; border-radius:12px; font-size:14px; line-height:1.45;
      border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); }
    .apple-notice.hidden { display:none; }
    .apple-notice ul { margin:8px 0 0; padding-left:18px; }
    .apple-notice li { margin:4px 0; }
    .apple-notice.error { border-color:rgba(250,45,72,.5); background:rgba(250,45,72,.10); }
    .apple-notice.warn  { border-color:rgba(251,176,59,.5); background:rgba(251,176,59,.10); }
    .apple-notice.info  { border-color:rgba(94,150,255,.45); background:rgba(94,150,255,.10); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true"></span>
      <span class="name" id="brandName">Song Deep Dive</span>
    </div>
    <div class="connects">
      <select id="langSelector" class="lang-selector" aria-label="Select language">
        <option value="en">English</option>
        <option value="es">Español</option>
      </select>
      <button id="connectBtn" class="btn-primary">Connect Spotify</button>
      <button id="appleBtn" class="btn-primary alt hidden">Connect Apple Music</button>
    </div>
  </header>

  <main class="stage">
    <!-- Now playing -->
    <section id="nowPlaying" class="now hidden" aria-live="polite">
      <img id="npArt" class="np-art" alt="" />
      <div class="np-meta">
        <div id="npTitle" class="np-title">—</div>
        <div id="npArtist" class="np-artist">—</div>
      </div>
      <div id="npState" class="np-state">·</div>
    </section>

    <!-- Manual fallback -->
    <section class="manual">
      <div class="manual-search">
        <input id="manualInput" type="text" placeholder="Or search a song to dive into…" autocomplete="off"
               role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="suggestList" />
        <ul id="suggestList" class="suggest hidden" role="listbox" aria-label="Song suggestions"></ul>
      </div>
      <button id="manualBtn" class="btn-ghost" data-i18n="btn.dive">Dive</button>
    </section>

    <!-- Deep dive -->
    <section id="deepDive" class="cards" aria-live="polite">
      <div class="empty" id="emptyState">
        <h1 id="emptyH1">Geek out about the music you love.</h1>
        <p id="emptyP">Connect Spotify (or search a song) and we'll surface the story behind it, who made it, and how it connects to everything else.</p>
      </div>
    </section>
  </main>

  <footer class="foot">
    <span id="appVersion">Song Deep Dive · v0.5</span>
    <span id="status" class="status">not connected</span>
  </footer>

  <!-- Card template -->
  <template id="cardTpl">
    <article class="card" tabindex="0">
      <div class="card-kicker"></div>
      <h2 class="card-title"></h2>
      <div class="card-scroll">
        <p class="card-body"></p>
        <div class="card-extra"></div>
      </div>
    </article>
  </template>

  <script src="./config.js"></script>
  <script src="./i18n.js"></script>
  <script src="./spotify.js"></script>
  <script src="./applemusic.js"></script>
  <script src="./app.js"></script>
</body>
</html>
