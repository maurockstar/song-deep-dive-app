<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Deep Dive</title>
  <meta name="description" content="The story, the people, and the connections behind the song you're playing.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo" aria-hidden="true"></span>
      <span class="name">Song Deep Dive</span>
    </div>
    <button id="connectBtn" class="btn-primary">Connect Spotify</button>
  </header>

  <main class="stage">
    <!-- Now playing -->
    <section id="nowPlaying" class="now hidden" aria-live="polite">
      <img id="npArt" class="np-art" alt="" />
      <div class="np-meta">
        <div id="npTitle" class="np-title">—</div>
        <div id="npArtist" class="np-artist">—</div>
      </div>
      <div id="npState" class="np-state">·</div>
    </section>

    <!-- Manual fallback -->
    <section class="manual">
      <input id="manualInput" type="text" placeholder="Or search a song to dive into…" autocomplete="off" />
      <button id="manualBtn" class="btn-ghost">Dive</button>
    </section>

    <!-- Deep dive -->
    <section id="deepDive" class="cards" aria-live="polite">
      <div class="empty" id="emptyState">
        <h1>Geek out about the music you love.</h1>
        <p>Connect Spotify (or search a song) and we'll surface the story behind it, who made it, and how it connects to everything else.</p>
      </div>
    </section>
  </main>

  <footer class="foot">
    <span>Song Deep Dive · Phase 1 foundation</span>
    <span id="status" class="status">not connected</span>
  </footer>

  <!-- Card template -->
  <template id="cardTpl">
    <article class="card" tabindex="0">
      <div class="card-kicker"></div>
      <h2 class="card-title"></h2>
      <p class="card-body"></p>
      <button class="card-more">Go deeper ↓</button>
      <div class="card-extra hidden"></div>
    </article>
  </template>

  <script src="./config.js"></script>
  <script src="./spotify.js"></script>
  <script src="./app.js"></script>
</body>
</html>
