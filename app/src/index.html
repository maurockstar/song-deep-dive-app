<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geeek</title>
  <meta name="description" content="The story, the people, and the connections behind the song you're playing.">
  <link rel="stylesheet" href="./styles.css">
  <style>
    /* Geeek "Sunset" tweaks for the topbar utilities + Apple Music notices */
    .connects { display:flex; gap:8px; align-items:center; }
    .btn-primary.alt { background:linear-gradient(135deg,#FB5C74,#FA233B); color:#FFF3E6; }
    .btn-primary.hidden { display:none; }
    .btn-primary.connected { filter:saturate(.8) brightness(1.04); }
    .lang-selector { background:#1E121A; border:1px solid #3C2735; color:var(--text); padding:9px 12px; border-radius:999px; cursor:pointer; font-size:13px; font-weight:600; font-family:var(--sans); }
    .lang-selector:hover { border-color:var(--sun-500); }
    .apple-notice { margin:0 0 14px; padding:12px 14px; border-radius:12px; font-size:14px; line-height:1.45;
      border:1px solid #2E1C28; background:rgba(246,236,224,.04); }
    .apple-notice.hidden { display:none; }
    .apple-notice ul { margin:8px 0 0; padding-left:18px; }
    .apple-notice li { margin:4px 0; }
    .apple-notice.error { border-color:rgba(255,90,74,.5); background:rgba(255,90,74,.10); }
    .apple-notice.warn  { border-color:rgba(255,198,75,.5); background:rgba(255,198,75,.10); }
    .apple-notice.info  { border-color:rgba(70,200,216,.45); background:rgba(70,200,216,.10); }

    /* Spotify-green connect button (Apple Music keeps the pink .alt style) */
    #connectBtn { background:linear-gradient(180deg,#1ED760,#1DB954); color:#04140D; }
    #connectBtn:hover { filter:brightness(1.05); }

    /* bigger logo + wordmark */
    .logo { width:36px; height:36px; }
    .name { font-size:22px; }

    /* "Setup" — hidden on desktop; the single control on mobile */
    .setup-toggle { position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }
    .setup-btn { display:none; align-items:center; gap:8px; cursor:pointer; user-select:none;
      font-family:var(--sans); font-weight:700; font-size:14px; color:var(--on-accent);
      background:linear-gradient(180deg,var(--sun-300),var(--sun-500)); padding:10px 20px;
      border-radius:999px; box-shadow:0 0 22px -6px var(--glow); }

    @media (max-width:680px) {
      .topbar { padding:12px 16px; }
      .logo { width:44px; height:44px; }
      .name { font-size:27px; }
      .setup-btn { display:inline-flex; }
      .connects { display:none; position:absolute; top:calc(100% + 10px); right:14px;
        flex-direction:column; align-items:stretch; gap:10px; min-width:236px;
        background:var(--panel); border:1px solid var(--border2); border-radius:16px;
        padding:14px; box-shadow:0 26px 60px -20px rgba(12,4,8,.75); z-index:30; }
      .setup-toggle:checked ~ .connects { display:flex; }
      .connects > * { width:100%; }
      .lang-selector { width:100%; text-align:center; }
      .btn-primary { width:100%; padding:11px 16px; font-size:15px; }
    }

    /* logo wordmark font — match the Claude Design "Sunset" mark (rounded Baloo 2) */
    .name { font-family:var(--rounded); font-weight:700; letter-spacing:-.01em; }

    /* search bar fills the row — Dive button removed (press Enter or pick a suggestion to dive) */
    #manualBtn { display:none; }

    /* bigger album art (2x) + now-playing text aligned to the bottom of the picture */
    .np-art { width:168px; height:168px; }
    .now { align-items:flex-end; }
    .np-right { flex:1; min-width:0; display:flex; align-items:flex-end; gap:14px; }
    .np-title.scrolling { text-overflow:clip; animation-name:nptitle; animation-timing-function:linear; animation-iteration-count:infinite; }
    @keyframes nptitle { 0%,12%{text-indent:0} 44%,56%{text-indent:var(--np-scroll,0)} 88%,100%{text-indent:0} }

    @media (max-width:680px) {
      .setup-btn { padding:7px 14px; font-size:13px; }
      .np-right { flex-direction:column; align-items:stretch; gap:6px; }
      .np-meta { flex:0 0 auto; }
      .np-state { text-align:left; }
    }

    /* search hidden behind an icon by default (cards prioritized); deploys left→right + pushes cards down */
    .manual { flex-direction:column; align-items:flex-start; gap:0; }
    .search-toggle { position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }
    .search-icon-btn { display:inline-flex; align-items:center; justify-content:center; width:46px; height:46px; border-radius:50%;
      background:var(--panel); border:1px solid var(--border2); color:var(--sun-400); cursor:pointer;
      transition:background .2s, color .2s, border-color .2s; }
    .search-icon-btn:hover { border-color:var(--sun-500); }
    .search-toggle:checked ~ .search-icon-btn { background:linear-gradient(180deg,var(--sun-300),var(--sun-500)); color:var(--on-accent); border-color:transparent; }
    .manual-search { width:100%; max-height:0; opacity:0; margin-top:0; overflow:hidden;
      transition:max-height .42s cubic-bezier(.22,.7,.2,1), margin-top .42s ease, opacity .3s ease; }
    .search-toggle:checked ~ .manual-search { max-height:60px; opacity:1; margin-top:12px; overflow:visible; }
    .manual-search input { max-width:0; transition:max-width .42s cubic-bezier(.22,.7,.2,1); }
    .search-toggle:checked ~ .manual-search input { max-width:100%; }

    /* desktop: logo 2x, brand aligned to the album cover's left edge (stage 920 + .now padding) */
    @media (min-width:681px) {
      .logo { width:72px; height:72px; }
      .name { font-size:44px; }
      .topbar { padding-left: max(36px, (100% - 920px) / 2 + 36px);
                padding-right: max(18px, (100% - 920px) / 2 + 18px); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg class="logo" viewBox="0 0 64 64" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="gk" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFC64B"/><stop offset="1" stop-color="#FF8A4D"/></linearGradient></defs>
        <rect x="9" y="28" width="11" height="24" rx="5.5" fill="url(#gk)"/>
        <rect x="26.5" y="8" width="11" height="44" rx="5.5" fill="url(#gk)"/>
        <rect x="44" y="18" width="11" height="34" rx="5.5" fill="url(#gk)"/>
      </svg>
      <span class="name" id="brandName">g<span class="e3">eee</span>k</span>
    </div>
    <input type="checkbox" id="setupToggle" class="setup-toggle" aria-hidden="true" tabindex="-1" />
    <label for="setupToggle" class="setup-btn" role="button" aria-label="Setup">Setup</label>
    <div class="connects">
      <select id="langSelector" class="lang-selector" aria-label="Select language">
        <option value="en">English</option>
        <option value="es">Español</option>
      </select>
      <button id="appleBtn" class="btn-primary alt hidden">Connect Apple Music</button>
      <button id="connectBtn" class="btn-primary">Connect Spotify</button>
    </div>
  </header>

  <main class="stage">
    <!-- Now playing -->
    <section id="nowPlaying" class="now hidden" aria-live="polite">
      <img id="npArt" class="np-art" alt="" />
      <div class="np-right">
        <div class="np-meta">
          <div id="npTitle" class="np-title">—</div>
          <div id="npArtist" class="np-artist">—</div>
        </div>
        <div id="npState" class="np-state">·</div>
      </div>
    </section>

    <!-- Manual fallback -->
    <section class="manual">
      <input type="checkbox" id="searchToggle" class="search-toggle" aria-hidden="true" tabindex="-1" />
      <label for="searchToggle" class="search-icon-btn" role="button" aria-label="Search a song">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      </label>
      <div class="manual-search">
        <input id="manualInput" type="text" placeholder="search a song to dive into…" autocomplete="off"
               role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="suggestList" />
        <ul id="suggestList" class="suggest hidden" role="listbox" aria-label="Song suggestions"></ul>
      </div>
      <button id="manualBtn" class="btn-ghost" data-i18n="btn.dive">Dive</button>
    </section>

    <!-- Deep dive -->
    <section id="deepDive" class="cards" aria-live="polite">
      <div class="empty" id="emptyState">
        <h1 id="emptyH1">Geek out about the music you love.</h1>
        <p id="emptyP">Connect Spotify (or search a song) and we'll surface the story behind it, who made it, and how it connects to everything else — then go live your life.</p>
      </div>
    </section>
  </main>

  <footer class="foot">
    <span id="appVersion">Geeek · family beta</span>
    <span id="status" class="status">not connected</span>
  </footer>

  <!-- Card template -->
  <template id="cardTpl">
    <article class="card" tabindex="0">
      <div class="card-kicker"></div>
      <h2 class="card-title"></h2>
      <div class="card-scroll">
        <p class="card-body"></p>
        <div class="card-extra"></div>
      </div>
    </article>
  </template>

  <script src="./config.js"></script>
  <script src="./i18n.js"></script>
  <script src="./spotify.js"></script>
  <script src="./applemusic.js"></script>
  <script src="./app.js"></script>
  <script>
    /* Song-title marquee: on mobile, slowly scroll the title left→right when it overflows.
       Animates text-indent on #npTitle itself, so app.js's textContent updates don't restart it;
       only re-evaluates when the title actually changes. Title only — never the artist. */
    (function () {
      var el = document.getElementById("npTitle");
      if (!el || !("MutationObserver" in window)) return;
      var lastTitle = null;
      function evalScroll() {
        var title = el.textContent || "";
        if (title === lastTitle) return;            // unchanged (e.g. poll re-render) — keep animating
        lastTitle = title;
        el.classList.remove("scrolling");
        el.style.removeProperty("--np-scroll");
        el.style.removeProperty("animation-duration");
        if (!window.matchMedia("(max-width:680px)").matches) return;   // mobile only
        var overflow = el.scrollWidth - el.clientWidth;
        if (overflow > 4) {
          el.style.setProperty("--np-scroll", "-" + (overflow + 8) + "px");
          el.style.animationDuration = Math.max(8, (overflow + 8) / 12) + "s";
          el.classList.add("scrolling");
        }
      }
      new MutationObserver(evalScroll).observe(el, { childList: true, characterData: true, subtree: true });
      window.addEventListener("resize", function () { lastTitle = null; evalScroll(); });
      evalScroll();
    })();
  </script>
</body>
</html>
