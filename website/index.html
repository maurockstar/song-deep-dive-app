  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r-spacing:-.03em;color:#F6ECE0;\">g<span style=\"display:inline-flex;align-items:flex-end;gap:2px;height:17px;margin:0 3px;vertical-align:baseline;\"><i style=\"width:5px;border-radius:3px;background:linear-gradient(180deg,#FFC64B,#FF8A4D);animation:gkb1 .9s ease-in-out infinite alternate;\"><\u002Fi><i style=\"width:5px;border-radius:3px;background:linear-gradient(180deg,#FFC64B,#FF8A4D);animation:gkb2 .78s ease-in-out infinite alternate;\"><\u002Fi><i style=\"width:5px;border-radius:3px;background:linear-gradient(180deg,#FFC64B,#FF8A4D);animation:gkb3 1.05s ease-in-out infinite alternate;\"><\u002Fi><\u002Fspan>k<\u002Fdiv>\n    <a href=\"#access\" style=\"text-decoration:none;background:linear-gradient(180deg,#FFB14D,#FF8A4D);color:#1A0B05;font-weight:700;font-size:14px;padding:9px 18px;border-radius:999px;box-shadow:0 0 22px -8px rgba(255,138,77,.6);\">Get early access<\u002Fa>\n  <\u002Fnav>\n\n  <!-- hero -->\n  <header style=\"max-width:1180px;margin:0 auto;padding:64px 28px 56px;display:grid;grid-template-columns:1fr 320px;gap:48px;align-items:center;\">\n    <div>\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#FF9F4D;margin-bottom:20px;\">WANNA GO DEEPER?<\u002Fdiv>\n      <h1 style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:62px;line-height:1.0;letter-spacing:-.03em;color:#F6ECE0;margin:0 0 22px;\" data-comment-anchor=\"f2664da004-h1\">For the music you<br>can't live without.<\u002Fh1>\n      <p style=\"font-size:19px;line-height:1.6;color:#BCA99B;margin:0 0 24px;max-width:44ch;\">Every track carries a whole world — the people, the samples, the connections. <b>geeek<\u002Fb> surfaces it in real time, for the ones who actually want to know.<\u002Fp>\n      <div style=\"display:inline-flex;flex-direction:column;gap:4px;border-left:3px solid #FF8A4D;padding:6px 0 6px 16px;\">\n        <div style=\"font-family:'Baloo 2',sans-serif;font-weight:600;font-size:20px;color:#F6ECE0;\">No pre-made playlists. No locked rooms.<\u002Fdiv>\n        <div style=\"font-family:'Baloo 2',sans-serif;font-weight:600;font-size:20px;color:#FF9F4D;\">You just do you.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative;display:flex;justify-content:center;\">\n      <div style=\"position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(255,138,77,.22),transparent 70%);filter:blur(10px);animation:gkglow 5s ease-in-out infinite;top:50%;left:50%;transform:translate(-50%,-50%);\"><\u002Fdiv>\n      <div style=\"position:relative;width:300px;\">\n        <dc-import name=\"AppPhone\" cycle=\"true\" style=\"width:300px;display:block;\" hint-size=\"300px,640px\"><\u002Fdc-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- manifesto -->\n  <section style=\"max-width:1160px;margin:0 auto;padding:24px 28px 64px;\">\n    <div style=\"border-top:1px solid #1E121A;padding-top:56px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;\">\n      <div>\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#FF9F4D;margin-bottom:12px;\">Why we exist<\u002Fdiv>\n        <h2 style=\"font-family:'Baloo 2',sans-serif;font-weight:600;font-size:40px;line-height:1.08;color:#F6ECE0;margin:0;\">We're geeks who get you.<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-size:18px;line-height:1.65;color:#BCA99B;margin:0;align-self:center;\">Most apps want one more minute of your attention. We want the opposite — to deepen the joy of a song you already love, then send you back into the world to feel, move, and be with the people who matter.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- features: each = full app, a different tab active -->\n  <section id=\"features\" style=\"max-width:1160px;margin:0 auto;padding:30px 28px 20px;\">\n    <div style=\"text-align:center;margin-bottom:8px;\">\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#FF9F4D;margin-bottom:10px;\">What you can do<\u002Fdiv>\n      <h2 style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:42px;letter-spacing:-.02em;color:#F6ECE0;margin:0;\">One song. A whole world behind it.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;padding:50px 0;\">\n      <div>\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#FF9F4D;margin-bottom:12px;\">Deep dive<\u002Fdiv>\n        <h3 style=\"font-family:'Baloo 2',sans-serif;font-weight:600;font-size:32px;line-height:1.1;color:#F6ECE0;margin:0 0 12px;\">Everything behind the song.<\u002Fh3>\n        <p style=\"font-size:17px;line-height:1.6;color:#BCA99B;margin:0;max-width:42ch;\">The story, the people who made it, the influences, the samples — glanceable cards that go deeper on tap. Real-time, on whatever you're playing.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;\"><dc-import name=\"AppPhone\" tab=\"cards\" style=\"width:288px;display:block;\" hint-size=\"288px,620px\"><\u002Fdc-import><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;padding:50px 0;border-top:1px solid #1E121A;\">\n      <div style=\"display:flex;justify-content:center;\"><dc-import name=\"TriviaFriends\" style=\"width:288px;display:block;\" hint-size=\"288px,620px\"><\u002Fdc-import><\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#FF9F4D;margin-bottom:12px;\">Trivia &amp; contests<\u002Fdiv>\n        <h3 style=\"font-family:'Baloo 2',sans-serif;font-weight:600;font-size:32px;line-height:1.1;color:#F6ECE0;margin:0 0 12px;\">Prove you're the biggest fan.<\u002Fh3>\n        <p style=\"font-size:17px;line-height:1.6;color:#BCA99B;margin:0;max-width:42ch;\">Play solo, challenge friends in a live room, or go head-to-head with an artist's superfans worldwide for the global #1 spot.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;padding:50px 0;border-top:1px solid #1E121A;\">\n      <div>\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#FF9F4D;margin-bottom:12px;\">Karaoke<\u002Fdiv>\n        <h3 style=\"font-family:'Baloo 2',sans-serif;font-weight:600;font-size:32px;line-height:1.1;color:#F6ECE0;margin:0 0 12px;\">Drop the vocals, take the mic.<\u002Fh3>\n        <p style=\"font-size:17px;line-height:1.6;color:#BCA99B;margin:0;max-width:42ch;\">AI removes the lead vocal in a tap, with time-synced lyrics that scroll and light up line by line as the song plays.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;\"><dc-import name=\"AppPhone\" tab=\"karaoke\" karaoke=\"true\" style=\"width:288px;display:block;\" hint-size=\"288px,620px\"><\u002Fdc-import><\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- bring your own music -->\n  <section style=\"max-width:1160px;margin:0 auto;padding:24px 28px 72px;\">\n    <div style=\"background:radial-gradient(700px 300px at 20% 0%,rgba(255,138,77,.12),transparent 60%),linear-gradient(180deg,#1E121A,#150C12);border:1px solid #2E1C28;border-radius:24px;padding:46px 44px;display:flex;align-items:center;justify-content:space-between;gap:40px;flex-wrap:wrap;\">\n      <div style=\"max-width:52ch;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#FF9F4D;margin-bottom:12px;\">Your mus
